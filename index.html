<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R Class Assignments Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --primary: #1c7cd5; /* RStudio-inspired blue */
            --primary-hover: #14599b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }

        .assignment-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .assignment-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            border: 1px solid #e2e8f0;
        }

        .assignment-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .assignment-info h3 {
            margin: 0 0 5px 0;
            color: var(--text-main);
            font-size: 1.25rem;
        }

        .assignment-card:hover .assignment-info h3 {
            color: var(--primary);
        }

        .assignment-info p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .view-btn {
            background-color: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .assignment-card:hover .view-btn {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <!-- Change these to your actual course details -->
            <h1>IBM 6540</h1>
            <p class="subtitle"> Assignments | Luis Berumen </p>
        </header>

        <main class="assignment-list">
            
            <!-- Assignment 1 Card -->
            <!-- The href automatically looks inside the folder for index.html -->
             <a href="M04" class="assignment-card">
                <div class="assignment-info">
                    <h3>W04-1: Reflection on Logistic Regression and Ch8</h3>
                </div>
                <span class="view-btn">View Report</span>
            </a>
            
            <!-- Assignment 2 Card -->
            <a href="M05" class="assignment-card">
                <div class="assignment-info">
                    <h3>CP-W05-2-Reflections on Video Quiz Review</h3>
                </div>
                <span class="view-btn">View Report</span>
          
            </a>
            
            <!-- Assignment 3 Card -->
            <a href="M06" class="assignment-card">
                <div class="assignment-info">
                    <h3>M06-Reflection on Advanced Data Wrangling in R</h3>
                </div>
                <span class="view-btn">View Report</span>
          
            </a>
            
            <!-- Assignment 4 Card -->
            <a href="M05-3" class="assignment-card">
                <div class="assignment-info">
                    <h3>W05-Reflection on Model Evaluation (Ch09)</h3>
                </div>
                <span class="view-btn">View Report</span>
          
            </a>
           
        </main>
    </div>

</body>
</html>
